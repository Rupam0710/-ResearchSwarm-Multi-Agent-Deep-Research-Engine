services:
  - type: web
    name: researchswarm-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn core.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: PYTHONPATH
        value: .